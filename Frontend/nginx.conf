server {
    listen 3001;
    root /usr/share/nginx/html;
    index index.html;

    # 콘텐츠 해시된 빌드 자산(_next/static) — 파일명이 매 빌드마다 바뀌므로 영구 캐시(불변).
    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # 그 외(HTML 등) — 항상 재검증. 옛 HTML 이 캐시에서 떠 옛 청크를 물고 와
    # "배포해도 화면이 안 바뀜" 문제가 나는 것을 방지(매 배포 자동 최신화).
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
